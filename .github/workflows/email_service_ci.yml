name: Email Service CI/CD

on:
  pull_request:
    branches: [ main ]
    types:
      - opened
      - synchronize
      - closed

jobs:
  build-check:
    if: github.event.pull_request.merged == false
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Build check
        run: docker build -t malblsh/email_service:pr-${{ github.event.pull_request.number }} .

  deploy:
    if: github.event.pull_request.merged == true
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Set SHA tag
        id: vars
        run: echo "SHA=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        run: |
          echo "${{ secrets.DOCKERHUB_PASSWORD }}" | \
          docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and push
        run: |
          docker build \
            -t malblsh/email_service:${{ steps.vars.outputs.SHA }} \
            -t malblsh/email_service:latest \
            .
          docker push malblsh/email_service:${{ steps.vars.outputs.SHA }}
          docker push malblsh/email_service:latest

      - name: Trigger deploy
        run: |
          curl -X POST \
          -H "Authorization: token ${{ secrets.DEPLOY_REPO_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/Podcast-service/Podcast_Service/dispatches \
          -d '{
            "event_type": "deploy",
            "client_payload": {
              "service": "email_service",
              "image_tag": "${{ steps.vars.outputs.SHA }}"
            }
          }'